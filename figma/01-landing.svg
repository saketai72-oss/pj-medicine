<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2120" viewBox="0 0 1440 2120" font-family="'Noto Sans', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="archLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DBEAFE"/>
      <stop offset="0.5" stop-color="#0891B2" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#164E63" flood-opacity="0.08"/>
    </filter>
    <filter id="btnShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0891B2" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- PAGE BG -->
  <rect width="1440" height="2120" fill="#FFFFFF"/>

  <!-- ============ NAVBAR ============ -->
  <g>
    <rect x="0" y="0" width="1440" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="72" x2="1440" y2="72" stroke="#F3F4F6" stroke-width="1"/>
    <!-- logo -->
    <rect x="144" y="20" width="32" height="32" rx="8" fill="#0891B2"/>
    <g transform="translate(152,28)" stroke="#FFFFFF" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 1v5a4 4 0 0 0 8 0V1"/>
      <path d="M7 12v1a3 3 0 0 0 3 3h1a3 3 0 0 0 3-3v-2"/>
      <circle cx="15" cy="9" r="1.6"/>
    </g>
    <text x="186" y="43" font-family="'Figtree', sans-serif" font-size="20" font-weight="800" fill="#0891B2" letter-spacing="-0.3">Drug-Pred AI</text>
    <!-- links -->
    <text x="784" y="42" font-size="14" font-weight="500" fill="#164E63" fill-opacity="0.7">Tổng quan</text>
    <text x="878" y="42" font-size="14" font-weight="500" fill="#164E63" fill-opacity="0.7">Dynamic Expert Switching</text>
    <text x="1064" y="42" font-size="14" font-weight="500" fill="#164E63" fill-opacity="0.7">Công nghệ</text>
    <!-- button -->
    <rect x="1140" y="14" width="156" height="44" rx="22" fill="#0891B2"/>
    <text x="1162" y="41" font-size="14" font-weight="600" fill="#FFFFFF">Mở Clinical Demo</text>
    <g transform="translate(1268,30)" stroke="#FFFFFF" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 6h12"/><path d="M7 1l5 5-5 5"/>
    </g>
  </g>

  <!-- ============ HERO ============ -->
  <g>
    <!-- badge -->
    <rect x="498" y="150" width="444" height="36" rx="18" fill="#EFF6FF" stroke="#DBEAFE"/>
    <g transform="translate(520,160)" fill="#0891B2"><path d="M9 0 1 10h5l-1 7 8-10H8l1-7z"/></g>
    <text x="544" y="173" font-size="14" font-weight="600" fill="#0891B2">Cross-lingual NLP · Dynamic LoRA Switching · XAI Ready</text>
    <!-- h1 -->
    <text x="720" y="282" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="56" font-weight="800" fill="#164E63" letter-spacing="-1">Dự đoán Nhóm thuốc với</text>
    <text x="720" y="352" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="56" font-weight="800" fill="url(#brandGrad)" letter-spacing="-1">XLM-RoBERTa + Multi-LoRA</text>
    <!-- subtitle -->
    <text x="720" y="412" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">Hệ thống hỗ trợ quyết định lâm sàng thế hệ mới. Áp dụng kiến trúc Dynamic Expert</text>
    <text x="720" y="440" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">Switching với XLM-RoBERTa đa ngữ giúp phân loại bệnh án tiếng Việt chính xác,</text>
    <text x="720" y="468" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">không cần dịch thuật.</text>
    <!-- buttons -->
    <rect x="472" y="520" width="264" height="56" rx="14" fill="#0891B2" filter="url(#btnShadow)"/>
    <g transform="translate(498,540)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8h-4l-3 7L9 1 6 8H2"/></g>
    <text x="534" y="554" font-size="17" font-weight="600" fill="#FFFFFF">Trải nghiệm Dashboard</text>
    <rect x="752" y="520" width="216" height="56" rx="14" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="860" y="554" text-anchor="middle" font-size="17" font-weight="600" fill="#164E63">Tìm hiểu Kiến trúc</text>
  </g>

  <!-- ============ ARCHITECTURE ============ -->
  <g>
    <rect x="0" y="672" width="1440" height="640" fill="#F8FAFB"/>
    <line x1="0" y1="672" x2="1440" y2="672" stroke="#F3F4F6"/>
    <line x1="0" y1="1312" x2="1440" y2="1312" stroke="#F3F4F6"/>
    <text x="720" y="788" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="36" font-weight="700" fill="#164E63">Kiến trúc Dynamic Expert Switching</text>
    <text x="720" y="828" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">Tận dụng sức mạnh đa ngữ của XLM-RoBERTa và tính chuyên biệt của nhiều LoRA</text>
    <text x="720" y="854" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">Adapters khác nhau cho từng chuyên khoa.</text>

    <!-- connecting line -->
    <rect x="200" y="1058" width="1040" height="4" rx="2" fill="url(#archLine)"/>

    <!-- card 1 -->
    <g>
      <rect x="144" y="950" width="270" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#cardShadow)"/>
      <circle cx="279" cy="1006" r="28" fill="#F9FAFB" stroke="#F3F4F6"/>
      <g transform="translate(267,994)" stroke="#164E63" stroke-opacity="0.7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h8l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M14 2v4h4"/><path d="M8 13h8M8 17h6"/></g>
      <text x="279" y="1066" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="18" font-weight="700" fill="#164E63">1. Keyword Router</text>
      <text x="279" y="1098" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">Dùng regex/keyword matching</text>
      <text x="279" y="1118" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">để định tuyến nhánh chuyên</text>
      <text x="279" y="1138" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">khoa (Hô hấp, Tim mạch…).</text>
    </g>
    <!-- card 2 (highlight) -->
    <g>
      <rect x="438" y="934" width="270" height="220" rx="16" fill="#FFFFFF" stroke="#0891B2" stroke-opacity="0.25" stroke-width="2" filter="url(#cardShadow)"/>
      <circle cx="573" cy="990" r="28" fill="#0891B2"/>
      <g transform="translate(561,978)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5"/><path d="M2 17l10 5 10-5"/></g>
      <text x="573" y="1050" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="18" font-weight="700" fill="#0891B2">2. Multi-LoRA Loading</text>
      <text x="573" y="1082" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">Nạp động Adapter .safetensors</text>
      <text x="573" y="1102" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">tương ứng vào XLM-RoBERTa</text>
      <text x="573" y="1122" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">Base Model đang chạy trên RAM.</text>
    </g>
    <!-- card 3 -->
    <g>
      <rect x="732" y="950" width="270" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#cardShadow)"/>
      <circle cx="867" cy="1006" r="28" fill="#F9FAFB" stroke="#F3F4F6"/>
      <g transform="translate(855,994)" stroke="#164E63" stroke-opacity="0.7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></g>
      <text x="867" y="1066" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="18" font-weight="700" fill="#164E63">3. AI Inference</text>
      <text x="867" y="1098" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">XLM-RoBERTa + LoRA dự đoán</text>
      <text x="867" y="1118" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">phân loại nhóm thuốc với attention</text>
      <text x="867" y="1138" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">đa ngữ, hỗ trợ tiếng Việt.</text>
    </g>
    <!-- card 4 (highlight cta) -->
    <g>
      <rect x="1026" y="934" width="270" height="220" rx="16" fill="#FFFFFF" stroke="#059669" stroke-opacity="0.25" stroke-width="2" filter="url(#cardShadow)"/>
      <circle cx="1161" cy="990" r="28" fill="#059669"/>
      <g transform="translate(1149,978)" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V5l8-3z"/><path d="M8 12l3 3 5-5"/></g>
      <text x="1161" y="1050" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="18" font-weight="700" fill="#059669">4. XAI Explainability</text>
      <text x="1161" y="1082" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">Module SHAP/LIME phân tích</text>
      <text x="1161" y="1102" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">"hot-spots" đảm bảo minh bạch,</text>
      <text x="1161" y="1122" text-anchor="middle" font-size="13" fill="#164E63" fill-opacity="0.6">trả về lý do quyết định y khoa.</text>
    </g>
  </g>

  <!-- ============ TECH STACK ============ -->
  <g>
    <rect x="0" y="1312" width="1440" height="688" fill="#FFFFFF"/>
    <text x="720" y="1428" text-anchor="middle" font-family="'Figtree', sans-serif" font-size="36" font-weight="700" fill="#164E63">Tech Stack Dự Án</text>
    <text x="720" y="1468" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">Thiết kế đề cao hiệu năng xử lý (High Performance) và khả năng mở rộng kiến thức</text>
    <text x="720" y="1494" text-anchor="middle" font-size="18" fill="#164E63" fill-opacity="0.6">y khoa (Isolation).</text>

    <!-- col 1: Core AI -->
    <g>
      <rect x="144" y="1560" width="362" height="320" rx="24" fill="#F9FAFB" stroke="#F3F4F6"/>
      <g transform="translate(184,1596)" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="28" height="28" rx="2"/><rect x="13" y="13" width="14" height="14" rx="1"/><path d="M16 1v5M24 1v5M16 34v5M24 34v5M1 16h5M1 24h5M34 16h5M34 24h5"/></g>
      <text x="184" y="1690" font-family="'Figtree', sans-serif" font-size="20" font-weight="700" fill="#164E63">Core AI &amp; ML</text>
      <g font-size="15" fill="#164E63" fill-opacity="0.75">
        <g transform="translate(184,1716)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="212" y="1729">XLM-RoBERTa (Multilingual)</text>
        <g transform="translate(184,1748)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="212" y="1761">Hugging Face PEFT (LoRA)</text>
        <g transform="translate(184,1780)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="212" y="1793">PyTorch Framework</text>
        <g transform="translate(184,1812)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="212" y="1825">VnCoreNLP / Underthesea</text>
        <g transform="translate(184,1844)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="212" y="1857">LIME/SHAP (XAI)</text>
      </g>
    </g>
    <!-- col 2: Backend -->
    <g>
      <rect x="538" y="1560" width="362" height="320" rx="24" fill="#F9FAFB" stroke="#F3F4F6"/>
      <g transform="translate(578,1596)" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="32" height="12" rx="2"/><rect x="4" y="22" width="32" height="12" rx="2"/><path d="M10 12h.01M10 28h.01"/></g>
      <text x="578" y="1690" font-family="'Figtree', sans-serif" font-size="20" font-weight="700" fill="#164E63">Backend Services</text>
      <g font-size="15" fill="#164E63" fill-opacity="0.75">
        <g transform="translate(578,1716)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="606" y="1729">FastAPI (Async API)</text>
        <g transform="translate(578,1748)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="606" y="1761">Uvicorn ASGI Server</text>
        <g transform="translate(578,1780)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="606" y="1793">PostgreSQL 16</text>
        <g transform="translate(578,1812)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="606" y="1825">SQLAlchemy ORM</text>
      </g>
    </g>
    <!-- col 3: Frontend -->
    <g>
      <rect x="932" y="1560" width="362" height="320" rx="24" fill="#F9FAFB" stroke="#F3F4F6"/>
      <g transform="translate(972,1596)" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M26 10l8 8-8 8"/><path d="M14 10l-8 8 8 8"/><path d="M22 6l-4 28"/></g>
      <text x="972" y="1690" font-family="'Figtree', sans-serif" font-size="20" font-weight="700" fill="#164E63">Frontend &amp; UI</text>
      <g font-size="15" fill="#164E63" fill-opacity="0.75">
        <g transform="translate(972,1716)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="1000" y="1729">React.js + TypeScript</text>
        <g transform="translate(972,1748)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="1000" y="1761">Vite Bundler</text>
        <g transform="translate(972,1780)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="1000" y="1793">Tailwind CSS v3</text>
        <g transform="translate(972,1812)"><circle cx="8" cy="8" r="8" fill="#0891B2" fill-opacity="0.12"/><path d="M5 8l2 2 4-4" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="1000" y="1825">Lucide Icons</text>
      </g>
    </g>
  </g>

  <!-- ============ FOOTER ============ -->
  <g>
    <rect x="0" y="2000" width="1440" height="120" fill="#164E63"/>
    <g transform="translate(144,2050)" stroke="#0891B2" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1v5a4 4 0 0 0 8 0V1"/><path d="M7 12v1a3 3 0 0 0 3 3h1a3 3 0 0 0 3-3v-2"/><circle cx="15" cy="9" r="1.6"/></g>
    <text x="172" y="2066" font-family="'Figtree', sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">Drug-Pred AI</text>
    <text x="1296" y="2065" text-anchor="end" font-size="14" fill="#FFFFFF" fill-opacity="0.5">© 2026 PJ-Medicine. Phục vụ mục đích Nghiên cứu.</text>
  </g>
</svg>
